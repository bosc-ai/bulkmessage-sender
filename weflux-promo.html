<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weflux CRM — Product Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="weflux-components.jsx"></script>
  <script type="text/babel" src="weflux-scenes.jsx"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { Stage, useTime } = window;
    const { WF, Scene1, Scene2, Scene3, Scene4, Finale } = window;

    function TimestampUpdater() {
      const t = useTime();
      React.useEffect(() => {
        const el = document.getElementById('video-root');
        if (el) el.setAttribute('data-screen-label', `t=${Math.floor(t)}s`);
      });
      return null;
    }

    function App() {
      return (
        <Stage
          width={1920}
          height={1080}
          duration={90}
          background={WF ? WF.bg : '#060d06'}
          persistKey="weflux-promo"
          loop={false}
        >
          <div
            id="video-root"
            data-screen-label="t=0s"
            style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}
          >
            <TimestampUpdater />
            <Scene1 />
            <Scene2 />
            <Scene3 />
            <Scene4 />
            <Finale />
          </div>
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
